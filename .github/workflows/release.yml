name: Release AdocForge packages

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish verified packages to npm after environment approval
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm pack:packages
      - run: pnpm verify:consumer
      - run: pnpm verify:publish
      - run: pnpm changeset status
      - run: pnpm publish:packages

  publish:
    if: inputs.publish
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm publish:packages -- --publish
        env:
          ADOCFORGE_PUBLISH_APPROVED: 'yes'
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_REGISTRY: https://registry.npmjs.org/
