name: Feature request
description: Propose a user-facing improvement
title: '[Feature]: '
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the workflow or limitation, independently of a proposed implementation.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Likely package
      options:
        - '@adocforge/core'
        - '@adocforge/ai'
        - '@adocforge/editor'
        - Playground or tooling
        - Unknown
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
