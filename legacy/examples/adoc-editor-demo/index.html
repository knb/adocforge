<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@kbmemo/adoc-editor demo</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }

      header {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #d0d7de;
        background: #f6f8fa;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: calc(100vh - 3rem);
      }

      .pane {
        min-height: 0;
      }

      .pane h2 {
        margin: 0;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        border-bottom: 1px solid #d0d7de;
        background: #fff;
      }

      #source-pane,
      #preview-pane {
        min-height: 20rem;
      }

      #preview-pane {
        padding: 1rem;
        overflow: auto;
        background: #fff;
      }

      .cm-editor {
        min-height: 20rem;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>@kbmemo/adoc-editor</strong> — source + live preview demo
    </header>
    <div class="layout">
      <section class="pane">
        <h2>Source</h2>
        <div id="source-pane"></div>
      </section>
      <section class="pane">
        <h2>Preview</h2>
        <div id="preview-pane" class="asciidoctor"></div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
